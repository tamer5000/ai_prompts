      {
        "parameters": {
          "jsCode": "return items.map(item => {\n  const data = item.json;\n\n  // =========================\n  // 1. Parse items (لو string)\n  // =========================\n  try {\n    if (typeof data.items === 'string') {\n      data.items = JSON.parse(data.items);\n    }\n  } catch (e) {\n    data.items = [];\n    data.error_items = \"Invalid JSON in items\";\n  }\n\n  // =========================\n  // 2. تأكيد إن items array\n  // =========================\n  if (!Array.isArray(data.items)) {\n    data.items = [];\n  }\n\n  // =========================\n  // 3. تنظيف كل item\n  // =========================\n  data.items = data.items.map(p => ({\n    product_name: p.product_name || null,\n    size: p.size || null,\n    color: p.color || null,\n    quantity: Number(p.quantity) || 1,\n    price: Number(p.price) || 0\n  }));\n\n  // =========================\n  // 4. حساب order_total صح\n  // =========================\n  data.order_total = data.items.reduce((sum, p) => {\n    return sum + (p.price * p.quantity);\n  }, 0);\n\n  // =========================\n  // 5. تنظيف الموبايل\n  // =========================\n  if (data.mobile_01) {\n    data.mobile_01 = data.mobile_01.replace(/\\D/g, '');\n  }\n\n  if (data.mobile_02) {\n    data.mobile_02 = data.mobile_02.replace(/\\D/g, '');\n  }\n\n  // =========================\n  // 6. تأكيد أنواع البيانات\n  // =========================\n  data.user_id = String(data.user_id || \"\");\n  data.order_id = String(data.order_id || \"\");\n  data.customer_name = data.customer_name || \"\";\n  data.address = data.address || \"\";\n\n  return item;\n});"
        },
