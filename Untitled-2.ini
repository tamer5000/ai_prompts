        "parameters": {
          "jsCode": "const oldHistory = $('Get row(s)5').first().json.history || \"\";\n\nconst userMessage = $('Inputs').first().json.mtxt || $json.message || \"\";\nconst botReply = $input.first().json.output.reply || \"\";\n\nconst newEntry = `user: ${userMessage}\\nbot: ${botReply}`;\n\nlet updatedHistory = oldHistory \n  ? oldHistory + \"\\n\" + newEntry \n  : newEntry;\n\n// آخر 15 سطور بس\nconst lines = updatedHistory.split(\"\\n\");\nupdatedHistory = lines.slice(-30).join(\"\\n\");\n\n// ⏰ الوقت الحالي\nconst now = new Date().toISOString();\n\nreturn [{\n  ...$json,\n  history: updatedHistory,\n  last_message_time: now\n}];"
        },
