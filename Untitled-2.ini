        {
          "parameters": {
            "jsCode": "return items.map(item => {\n  const data = item.json;\n\n  // =========================\n  // 1. Parse items (لو string)\n  // =========================\n  try {\n    if (typeof data.items === 'string') {\n      data.items = JSON.parse(data.items);\n    }\n  } catch (e) {\n    data.items = [];\n    data.error_items = \"Invalid JSON in items\";\n  }\n\n  // =========================\n  // 2. تأكيد إن items array\n  // =========================\n  if (!Array.isArray(data.items)) {\n    data.items = [];\n  }\n\n  // =========================\n  // 3. تنظيف كل item\n  // =========================\n  data.items = data.items.map(p => ({\n    product_name: p.product_name || null,\n    size: p.size || null,\n    color: p.color || null,\n    quantity: Number(p.quantity) || 1,\n    price: Number(p.price) || 0\n  }));\n\n  // =========================\n  // 4. حساب order_total صح\n  // =========================\n  data.order_total = data.items.reduce((sum, p) => {\n    return sum + (p.price * p.quantity);\n  }, 0);\n\n  // =========================\n  // 5. تنظيف الموبايل\n  // =========================\n  if (data.mobile_01) {\n    data.mobile_01 = data.mobile_01.replace(/\\D/g, '');\n  }\n\n  if (data.mobile_02) {\n    data.mobile_02 = data.mobile_02.replace(/\\D/g, '');\n  }\n\n  // =========================\n  // 6. تأكيد أنواع البيانات\n  // =========================\n  data.user_id = String(data.user_id || \"\");\n  data.order_id = String(data.order_id || \"\");\n  data.customer_name = data.customer_name || \"\";\n  data.address = data.address || \"\";\n\n  return item;\n});"
          },
          "type": "n8n-nodes-base.code",
          "typeVersion": 2,
          "position": [
            -4576,
            1280
          ],
          "id": "5948c76f-1dfd-4f97-a719-06b2f1ea4298",
          "name": "Code in JavaScript3"
        },
        {
          "parameters": {
            "jsCode": "const order = $json;\n\nlet itemsText = '';\n\n// تحديد نوع الطلب\nlet title = '🧾 طلب';\nif (order.status === 'created') {\n  title = '🧾 طلب جديد';\n} else if (order.status === 'updated') {\n  title = '🔄 تحديث طلب';\n}\n\n// حماية لو items فاضية أو undefined\nif (order.items && order.items.length > 0) {\n  order.items.forEach(item => {\n    const total = item.quantity * item.price;\n\n    itemsText += `• <b>${item.product_name}</b>\\n`;\n    itemsText += `المقاس: ${item.size} | اللون: ${item.color}\\n`;\n    itemsText += `الكمية: ${item.quantity} × ${item.price} = <b>${total} جنيه</b>\\n\\n`;\n  });\n} else {\n  itemsText = 'لا يوجد منتجات';\n}\n\n// حماية للتاريخ\nconst date = order.createdAt\n  ? order.createdAt.split('T')[0]\n  : 'غير متوفر';\n\nreturn [{\n  html: `<b>${title} - Ai Agent</b>\n\n<b>📦 رقم الطلب:</b> ${order.order_id || '-'}  \n<b>👤 الاسم:</b> ${order.customer_name || '-'}  \n<b>📱 رقم الهاتف:</b> ${order.mobile_01 || '-'}  \n<b>📍 العنوان:</b> ${order.address || '-'}  \n\n----------------------\n<b>🛒 المنتجات:</b>\n\n${itemsText}\n----------------------\n<b>💰 الإجمالي:</b> <b>${order.order_total || 0} جنيه</b>\n<b>📅 التاريخ:</b> ${date}`\n}];"
          },
          "type": "n8n-nodes-base.code",
          "typeVersion": 2,
          "position": [
            -4352,
