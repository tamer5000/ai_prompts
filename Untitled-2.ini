      {
        "parameters": {
          "jsCode": "const order = $json;\n\nlet itemsText = '';\n\n// تحديد نوع الطلب\nlet title = '🧾 طلب';\nif (order.status === 'created') {\n  title = '🧾 طلب جديد';\n} else if (order.status === 'updated') {\n  title = '🔄 تحديث طلب';\n}\n\n// حماية لو items فاضية أو undefined\nif (order.items && order.items.length > 0) {\n  order.items.forEach(item => {\n    const total = item.quantity * item.price;\n\n    itemsText += `• <b>${item.product_name}</b>\\n`;\n    itemsText += `المقاس: ${item.size} | اللون: ${item.color}\\n`;\n    itemsText += `الكمية: ${item.quantity} × ${item.price} = <b>${total} جنيه</b>\\n\\n`;\n  });\n} else {\n  itemsText = 'لا يوجد منتجات';\n}\n\n// حماية للتاريخ\nconst date = order.createdAt\n  ? order.createdAt.split('T')[0]\n  : 'غير متوفر';\n\nreturn [{\n  html: `<b>${title} - Ai Agent</b>\n\n<b>📦 رقم الطلب:</b> ${order.order_id || '-'}  \n<b>👤 الاسم:</b> ${order.customer_name || '-'}  \n<b>📱 رقم الهاتف:</b> ${order.mobile_01 || '-'}  \n<b>📍 العنوان:</b> ${order.address || '-'}  \n\n----------------------\n<b>🛒 المنتجات:</b>\n\n${itemsText}\n----------------------\n<b>💰 الإجمالي:</b> <b>${order.order_total || 0} جنيه</b>\n<b>📅 التاريخ:</b> ${date}`\n}];"
        },
