Data Base


========================
TABLE: users
========================
id           uuid      PK
name         text
created_at   timestamp
identifier   text


========================
TABLE: conversations
========================
id           uuid      PK      default: gen_random_uuid()
mode         text              default: 'browsing'
sub_state    text              default: 'start'
last_action  text
updated_at   timestamp         default: now()
user_id      uuid      FK → users.id


========================
TABLE: messages_log
========================
id          uuid      PK      default: gen_random_uuid()
direction   text
message     text
intent      text
action      text
created_at  timestamp         default: now()
user_id     uuid      FK → users.id
mid         text


========================
TABLE: products
========================
id          integer   PK      auto increment
code        text
name        text
category    text
price       numeric
sizes       array
colors      array
image_url   text
stock       integer   default: 10
is_active   boolean   default: true
created_at  timestamp default: now()


========================
TABLE: user_memory
========================
user_id            uuid      PK / FK → users.id
last_category      text
last_product_code  text
last_action        text
updated_at         timestamp default: now()


========================
TABLE: user_preferences
========================
id                  integer   PK      auto increment
preferred_category  text
preferred_size      text
preferred_color     text
budget_min          numeric
budget_max          numeric
updated_at          timestamp default: now()
user_id             uuid      FK → users.id


========================
TABLE: viewed_products
========================
user_id      uuid      FK → users.id
product_id   integer   FK → products.id


========================
TABLE: orders
========================
id         uuid      PK      default: gen_random_uuid()
items      jsonb
total      numeric
status     text
address    text
notes      text
updated_at timestamp default: now()
user_id    uuid      FK → users.id


========================
TABLE: leads
========================
id               uuid      PK      default: gen_random_uuid()
name             text
phone            text
address          text
product_type     text
size             text
color            text
quantity         integer   default: 1
stage            text
last_interaction text
updated_at       timestamp default: CURRENT_TIMESTAMP
user_id          uuid      FK → users.id


========================
RELATIONSHIPS
========================
users.id → conversations.user_id
users.id → messages_log.user_id
users.id → user_memory.user_id
users.id → user_preferences.user_id
users.id → viewed_products.user_id
users.id → orders.user_id
users.id → leads.user_id

products.id → viewed_products.product_id


========================
SYSTEM FLOW (REAL)
========================
User 
 ↓
Conversations (state machine)
 ↓
Messages_log (chat history)
 ↓
AI Processing
 ↓
 ├── user_memory (last actions / context)
 ├── user_preferences (structured preferences)
 └── viewed_products (behavior tracking)
            ↓
         products
            ↓
         leads
            ↓
         orders


========================
